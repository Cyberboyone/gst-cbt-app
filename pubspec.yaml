name: gst_cbt
description: A complete CBT practice app for Nigerian university GST courses, powered by a GitHub content backend and offline-first local Hive storage.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Database (Offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking & Caching
  dio: ^5.4.0
  dio_cache_interceptor: ^3.4.4
  dio_cache_interceptor_hive_store: ^3.2.2
  connectivity_plus: ^5.0.2

  # Media & Animations
  lottie: ^3.1.0
  audioplayers: ^6.0.0

  # PDF generation & viewing
  pdf: ^3.10.7
  printing: ^5.11.1
  flutter_pdfview: ^1.3.2

  # Utilities
  uuid: ^4.3.3
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  encrypt: ^5.0.1
  intl: ^0.19.0

  # Ads (AdMob)
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/questions/
