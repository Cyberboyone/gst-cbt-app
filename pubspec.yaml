name: gst_cbt
description: A complete CBT practice app for Nigerian university GST courses, powered by a GitHub content backend and offline-first local Hive storage.
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Database (Offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking & Caching
  dio: ^5.4.0
  dio_cache_interceptor: ^3.4.4
  dio_cache_interceptor_hive_store: ^3.2.2
  connectivity_plus: ^5.0.2

  # Utilities
  uuid: ^4.3.3
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  intl: ^0.19.0

  # Media & animations
  audioplayers: ^6.0.0

  # Ads (Unity)
  unity_ads_plugin: ^0.4.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_analytics: ^10.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.jpg"
  adaptive_icon_background: "#1B3A6B"
  adaptive_icon_foreground: "assets/icon.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/questions/
    - assets/sounds/
    - assets/materials/
